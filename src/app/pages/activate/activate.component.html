<div class="activate-container">
  <div class="section-header">
    <h2>Activity Tables</h2>
    <span class="subtitle">Compare Product</span>
  </div>
  
  <div class="table-container">
    <table class="activity-table">
      <thead>
        <tr>
          <th>Category</th>
          <th>Product</th>
          <th>Status</th>
          <th>Date</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of activityTables">
          <td>{{ item.category }}</td>
          <td class="product-name">{{ item.name }}</td>
          <td>
            <span class="status-badge" [class]="item.status.toLowerCase()">
              {{ item.status }}
            </span>
          </td>
          <td>{{ item.date }}</td>
          <td>{{ item.description }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
